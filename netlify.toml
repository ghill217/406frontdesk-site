# Netlify build + hosting config for the 406 Front Desk site.
[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "24"

# Security + caching headers (helps Performance + best-practices audits)
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    # microphone=self is required by the GHL voice web-call widget (runs in-page, not an iframe);
    # the two leadconnectorhq origins cover a future iframe-based call flow.
    Permissions-Policy = "geolocation=(), microphone=(self \"https://widgets.leadconnectorhq.com\" \"https://services.leadconnectorhq.com\"), camera=()"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
